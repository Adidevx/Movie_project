<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center><h1>Movies List</h1></center>
    {% for i in movies %}
        <img height="200px" src="{{i.image.url}}" alt="">
        <h2>Title: {{i.name}}</h2>
        <h2>Durations: {{i.durations}} mins</h2>
        <button>Views</button><br>
    {% endfor %}
</body>
</html>
