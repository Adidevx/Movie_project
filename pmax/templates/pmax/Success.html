<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Confirmed</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");

background-size:cover;
background-position:center;

color:white;
}

/* MAIN CARD */

.success-box{

background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);

padding:50px;
border-radius:15px;

text-align:center;

box-shadow:
0 20px 50px rgba(0,0,0,0.9),
0 0 20px rgba(255,42,109,0.3);

animation:fadeUp 1s ease;
}

/* CHECKMARK CIRCLE */

.circle{
width:120px;
height:120px;

border-radius:50%;

background:linear-gradient(45deg,#00ff9c,#00d9ff);

display:flex;
align-items:center;
justify-content:center;

margin:auto;
margin-bottom:25px;

animation:pop 0.6s ease;
}

.check{
font-size:60px;
color:black;
}

/* TEXT */

.success-box h1{
margin-bottom:10px;
}

.success-box p{
opacity:0.9;
margin-bottom:25px;
}

/* BUTTON */

.btn{

background:linear-gradient(45deg,#ff2a6d,#ff7b00);

padding:12px 30px;

border-radius:25px;

text-decoration:none;
color:white;
font-weight:bold;

transition:0.3s;

box-shadow:0 5px 20px rgba(255,42,109,0.4);
}

.btn:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(255,42,109,0.7);
}

/* ANIMATIONS */

@keyframes pop{
0%{
transform:scale(0);
}
80%{
transform:scale(1.2);
}
100%{
transform:scale(1);
}
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="success-box">

<div class="circle">
<div class="check">✓</div>
</div>

<h1>Booking Successful!</h1>

<p>Your movie tickets have been booked successfully.</p>

<a href="{% url 'dashboard' %}" class="btn">Go to Dashboard</a>

</div>

</body>
</html>
