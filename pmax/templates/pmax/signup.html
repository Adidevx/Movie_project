<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup | Movie Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.75),rgba(0,0,0,0.85)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");

background-size:cover;
background-position:center;
overflow:hidden;
}

/* GLOW LIGHT EFFECTS */

body::before{
content:"";
position:absolute;
top:-200px;
left:-200px;
width:500px;
height:500px;
background:radial-gradient(circle, rgba(255,0,80,0.4), transparent 70%);
filter:blur(120px);
animation:lightMove 8s infinite alternate;
}

body::after{
content:"";
position:absolute;
bottom:-200px;
right:-200px;
width:500px;
height:500px;
background:radial-gradient(circle, rgba(255,180,0,0.4), transparent 70%);
filter:blur(120px);
animation:lightMove 10s infinite alternate;
}

@keyframes lightMove{
from{
transform:translateY(0px);
}
to{
transform:translateY(80px);
}
}

/* SIGNUP CARD */

.signup{
background:rgba(20,20,20,0.9);
backdrop-filter:blur(10px);
padding:40px;
border-radius:16px;
width:340px;

display:flex;
flex-direction:column;
gap:18px;

border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 0 40px rgba(0,0,0,0.9),
0 0 15px rgba(255,0,80,0.3);

animation:fadeIn 1s ease;
z-index:2;
}

/* FORM ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.signup h2{
text-align:center;
color:white;
letter-spacing:1px;
}

/* INPUT FIELDS */

.signup input{
padding:12px;
border:none;
border-radius:8px;
outline:none;
font-size:14px;

background:#1f1f1f;
color:white;

border:1px solid rgba(255,255,255,0.08);
transition:0.3s;
}

.signup input:focus{
border:1px solid #ff2a6d;
box-shadow:0 0 10px rgba(255,42,109,0.5);
}

/* BUTTON */

.signup button{
background:linear-gradient(45deg,#ff2a6d,#ff7b00);
border:none;
padding:12px;
border-radius:25px;

font-weight:bold;
cursor:pointer;
color:white;

transition:0.3s;

box-shadow:0 5px 20px rgba(255,42,109,0.4);
}

.signup button:hover{
transform:scale(1.06);
box-shadow:0 10px 25px rgba(255,42,109,0.7);
}

/* ERROR MESSAGE */

.error{
color:#ff4d4d;
text-align:center;
font-weight:bold;
}

/* MOBILE */

@media(max-width:500px){

.signup{
width:90%;
padding:30px;
}

}

</style>

</head>

<body>

<form action="" class="signup" method="post">

{% csrf_token %}

<h2>Create Account</h2>

<input type="text" placeholder="Enter username" name="username" required>

<input type="email" placeholder="Enter email" name="email" required>

<input type="password" placeholder="Enter password" name="password" required>

<button>Signup</button>

{% if error %}
<p class="error">{{error}}</p>
{% endif %}

</form>

</body>
</html>
