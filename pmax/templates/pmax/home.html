<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 75px;
            width: 100%;
            background-color: black;
            color: white;
        }

        .right{
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 30%;
        }
        .hero-section{
      height: 300px;
      background-color: black;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-evenly;
      flex-direction: column;
      margin-bottom: 50px;
    }

    .hero-section button{
      background-color: green;
      color: white;
      font-weight: bolder;
      border: none;
      border-radius: 10px;
      padding: 10px;
    }
    .movies {
        display: flex;
        align-items: center;
        justify-content: space-around;
        margin-top: 30px;
    }
    .movies img {
        height: 200px;
        box-shadow: 0 0 15px black;
        border-radius: 10px;
        transition: all 0.6s;
    }
    .movies img:hover{
        transform: scale(1.06);
    }
    a {
        text-decoration: none;
        color: white;
    }
    a:hover{
        color: orange;
    }
    </style>
</head>
<body>
    <div class="nav">
        <div class="left">
            <h2>Pmax</h2>
        </div>
        <div class="right">
            <a href="{% url 'Signup' %}"><h2>Signup</h2></a>
            <a href="{% url 'Login' %}"><h2>Login</h2></a>
        </div>
    </div>
    <div class="hero-section">
        <h1>Welcome to Pmax </h1>
        <h2>Browse Latest Movies</h2>
        <button>Browse</button>
    </div>
    <center>
        <h1 style="padding: 10px; background-color: green; color: white;">Latest Movies</h1>
    </center>
    <div class="movies">
        <img src="https://images.news18.com/ibnlive/uploads/2025/12/Dhurandhar-2-2025-12-70ea0438f4942e7226847a93e05f76b2.webp">
        <img src="https://upload.wikimedia.org/wikipedia/en/1/14/Tom_%26_Jerry_%28Official_2021_Film_Poster%29.png">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTW9lVAhxOwK-NCSrsvev3TLfQundTIMm2OZw&s">
        
    </div>
    <div class="movies">
        <img src="https://images.news18.com/ibnlive/uploads/2025/12/Dhurandhar-2-2025-12-70ea0438f4942e7226847a93e05f76b2.webp">
        <img src="https://upload.wikimedia.org/wikipedia/en/1/14/Tom_%26_Jerry_%28Official_2021_Film_Poster%29.png">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTW9lVAhxOwK-NCSrsvev3TLfQundTIMm2OZw&s">
        
    </div>
</body>
</html>
