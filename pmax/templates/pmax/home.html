<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pmax Movies</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
background:
linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");

background-size:cover;
background-position:center;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:0 40px;
height:75px;
width:100%;

background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);

position:sticky;
top:0;
z-index:100;

border-bottom:1px solid rgba(255,255,255,0.08);

animation:navFade 1s ease;
}

@keyframes navFade{
from{opacity:0;transform:translateY(-30px)}
to{opacity:1;transform:translateY(0)}
}

.left h2{
color:#ff2a6d;
letter-spacing:2px;
}

.right{
display:flex;
gap:30px;
}

.right a{
text-decoration:none;
color:white;
font-weight:500;
transition:0.3s;
}

.right a:hover{
color:#ff2a6d;
}

/* HERO */

.hero-section{
height:420px;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;

gap:20px;

animation:fadeHero 1.5s ease;
}

@keyframes fadeHero{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.hero-section h1{
font-size:55px;
letter-spacing:2px;
}

.hero-section h2{
font-weight:300;
opacity:0.9;
}

/* BROWSE BUTTON */

.browse-btn{
background:linear-gradient(45deg,#ff2a6d,#ff7b00);
padding:12px 30px;
border-radius:30px;

text-decoration:none;
color:white;
font-weight:bold;

transition:0.3s;

box-shadow:0 5px 20px rgba(255,42,109,0.4);
}

.browse-btn:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(255,42,109,0.7);
}

/* SECTION TITLE */

.section-title{
text-align:center;
margin:60px 0 20px;
}

.section-title h1{
display:inline-block;

padding:10px 30px;

background:linear-gradient(45deg,#ff2a6d,#ff7b00);

border-radius:25px;
}

/* MOVIES GRID */

.movies{
display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:50px;

padding:40px 100px;

justify-items:center;
}

/* MOVIE CARD */

.movie-card{
position:relative;
transition:0.4s;
}

.movie-card img{
width:260px;
height:360px;

object-fit:cover;

border-radius:15px;

box-shadow:
0 15px 40px rgba(0,0,0,0.8),
0 0 15px rgba(255,42,109,0.2);

transition:0.5s;
}

/* HOVER EFFECT */

.movie-card:hover{
transform:translateY(-15px) scale(1.08);
}

.movie-card:hover img{
box-shadow:
0 25px 60px rgba(0,0,0,0.9),
0 0 25px rgba(255,42,109,0.6);
}

/* GLOW SWEEP */

.movie-card::after{
content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

border-radius:15px;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.3),
transparent
);

opacity:0;

transition:0.5s;
}

.movie-card:hover::after{
opacity:1;
}

/* SCROLL ANIMATION */

.fade-in{
opacity:0;
transform:translateY(40px);
animation:fadeUp 1s forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

/* MOBILE */

@media(max-width:700px){

.hero-section h1{
font-size:36px;
}

.movies{
padding:30px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="nav">

<div class="left">
<h2>Pmax</h2>
</div>

<div class="right">
<a href="{% url 'Signup' %}">Signup</a>
<a href="{% url 'Login' %}">Login</a>
</div>

</div>

<!-- HERO -->

<div class="hero-section">

<h1>Welcome to Pmax</h1>

<h2>Browse Latest Movies</h2>

<a href="{% url 'Login' %}" class="browse-btn">Browse Movies</a>

</div>

<!-- TITLE -->

<div class="section-title">
<h1>Latest Movies</h1>
</div>

<!-- MOVIES -->

<div class="movies fade-in">

<div class="movie-card">
<img src="https://images.news18.com/ibnlive/uploads/2025/12/Dhurandhar-2-2025-12-70ea0438f4942e7226847a93e05f76b2.webp">
</div>

<div class="movie-card">
<img src="https://upload.wikimedia.org/wikipedia/en/1/14/Tom_%26_Jerry_%28Official_2021_Film_Poster%29.png">
</div>

<div class="movie-card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTW9lVAhxOwK-NCSrsvev3TLfQundTIMm2OZw&s">
</div>

</div>

</body>
</html>
