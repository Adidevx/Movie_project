<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seat Booking</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* BACKGROUND */

body{
background:
linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.9)),
url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba");

background-size:cover;
background-position:center;
color:white;
padding:40px;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

/* BOOKING CARD */

.booking-container{
background:rgba(0,0,0,0.65);
backdrop-filter:blur(10px);
padding:30px;
border-radius:15px;
width:700px;
max-width:95%;

box-shadow:
0 15px 40px rgba(0,0,0,0.8),
0 0 15px rgba(255,42,109,0.2);
}

.booking-container h2{
margin-bottom:8px;
}

/* SCREEN */

.screen{
margin:30px auto;
width:80%;
height:40px;
background:linear-gradient(to bottom,#ccc,#777);
border-radius:50%;
text-align:center;
color:black;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
}

/* SEAT AREA */

.seatArea{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(50px,1fr));
gap:15px;
margin-top:20px;
}

/* SEAT */

.seatArea div{
display:flex;
align-items:center;
justify-content:center;

background:#2c2c2c;

padding:10px;
border-radius:8px;

cursor:pointer;

font-weight:bold;

border:1px solid rgba(255,255,255,0.1);

transition:0.3s;
}

/* HOVER */

.seatArea div:hover{
transform:scale(1.1);
}

/* SELECTED SEATS */

.seatArea div.selected{
background:linear-gradient(45deg,#00ff9c,#00d9ff);
color:black;
box-shadow:0 0 10px rgba(0,255,200,0.8);
}

/* BOOKED SEATS */

.seatArea div.booked{
background:#ff2a2a;
color:white;
cursor:not-allowed;
opacity:0.7;
}

/* LEGEND */

.legend{
display:flex;
gap:20px;
margin-top:20px;
}

.legend div{
display:flex;
align-items:center;
gap:6px;
}

.box{
width:18px;
height:18px;
border-radius:4px;
}

.available{background:#2c2c2c;}
.selectedSeat{background:linear-gradient(45deg,#00ff9c,#00d9ff);}
.bookedSeat{background:#ff2a2a;}

/* BUTTON */

button{
margin-top:25px;

background:linear-gradient(45deg,#ff2a6d,#ff7b00);

border:none;
padding:12px 25px;

border-radius:25px;

color:white;
font-weight:bold;

cursor:pointer;

transition:0.3s;

box-shadow:0 5px 20px rgba(255,42,109,0.4);
}

button:hover{
transform:scale(1.08);
box-shadow:0 10px 30px rgba(255,42,109,0.7);
}

</style>
</head>

<body>

<div class="booking-container">

<h2>{{show.movie.name}} - {{show.theatre.name}}</h2>
<h2>Show Time: {{show.show_time}}</h2>
<h2>Available seats: {{show.available_seats}}</h2>
<h2>Price: ₹{{show.price}}</h2>

<div class="screen">SCREEN</div>

<form action="" method="post">
{% csrf_token %}

<div class="seatArea">

{% for seat in seats %}

<div id="{{seat}}" class="{{seat}} {% if seat in booked_seats %}booked{% endif %}" onclick="selectSeat('{{seat}}')">
{{seat}}
</div>

{% endfor %}

</div>

<input type="hidden" name="selected_seats" id="selectedSeats">

<div class="legend">

<div><span class="box available"></span> Available</div>
<div><span class="box selectedSeat"></span> Selected</div>
<div><span class="box bookedSeat"></span> Booked</div>

</div>

<button>Confirm Booking</button>

</form>

</div>

<script>

let selected=[]

function selectSeat(id){

let seat=document.getElementById(id)

if(seat.classList.contains("booked")) return

seat.classList.toggle("selected")

if(seat.classList.contains("selected")){
selected.push(id)
}else{
selected=selected.filter(s=>s!=id)
}

document.getElementById("selectedSeats").value=selected.join(",")

}

</script>

</body>
</html>
